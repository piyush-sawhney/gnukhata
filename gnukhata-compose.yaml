services:
  db:
    image: postgres:16-alpine
    container_name: postgres
    restart: "always"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - postgres-network
    expose:
      - "5432"
    volumes:
      - gkdb:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}'"]
      interval: 10s
      timeout: 3s
      retries: 3

  gkcore:
    image: ${GKCORE_IMAGE:-digitalfreedom/gkcore:latest}
    container_name: gkcore
    restart: "always"
    environment:
      - GKCORE_DB_HOST=db
      - GKCORE_DB_PORT=5432
      - ENVIRONMENT=production
    networks:
      - postgres-network
      - gk-network
    depends_on:
      db:
        condition: service_healthy

  gkapp:
    image: ${GKAPP_IMAGE:-digitalfreedom/gkapp:latest}
    restart: "always"
    environment:
      - VITE_GKCORE_URL=https://${GK_URL}/api
    networks:
      - traefik-public
      - gk-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.gkapp.rule=Host(`${GK_URL:?GK_URL environment variable is not set}`)"
      - "traefik.http.routers.gkapp.entrypoints=websecure"
      - "traefik.http.routers.gkapp.tls.certresolver=${TRAEFIK_CERT_RESOLVER:?TRAEFIK_CERT_RESOLVER environment variable is not set}"

networks:
  traefik-public:
    external: true
  gk-network:
    external: false
    driver: bridge
  postgres-network:
    external: false
    driver: bridge

volumes:
  gkdb: