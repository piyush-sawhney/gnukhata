services:
  db:
    image: postgres:16-alpine
    container_name: postgres_gk
    restart: "always"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - postgres-network
    volumes:
      - gkdb:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}'"]
      interval: 10s
      timeout: 3s
      retries: 3

  gkcore:
    image: ${GKCORE_IMAGE:-digitalfreedom/gkcore:latest}
    container_name: gk_core
    restart: "always"
    environment:
      - GKCORE_DB_HOST=db
      - GKCORE_DB_PORT=5432
      - ENVIRONMENT=production
    networks:
      - postgres-network
      - traefik-public  
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.gkcore.rule=Host(`${GK_URL}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.gkcore.entrypoints=websecure"
      - "traefik.http.routers.gkcore.tls.certresolver=${TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.middlewares.gk-strip.stripprefix.prefixes=/api"
      - "traefik.http.routers.gkcore.middlewares=gk-strip"
      - "traefik.http.services.gkcore.loadbalancer.server.port=6543"

  gkapp:
    image: ${GKAPP_IMAGE:-digitalfreedom/gkapp:latest}
    container_name: gk_app
    restart: "always"
    environment:
      - VITE_GKCORE_URL=https://${GK_URL}/api
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.gkapp.rule=Host(`${GK_URL}`)"
      - "traefik.http.routers.gkapp.entrypoints=websecure"
      - "traefik.http.routers.gkapp.tls.certresolver=${TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.services.gkapp.loadbalancer.server.port=80"

networks:
  traefik-public:
    external: true
  postgres-network:
    driver: bridge
    external: false

volumes:
  gkdb: